<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Banksy Private Sale</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #f5f0e8;
            --gold-accent: #c9a84c;
            --card-bg: rgba(15, 15, 15, 0.65);
            --nav-bg: rgba(5, 5, 5, 0.75);
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(rgba(5, 5, 5, 0.88), rgba(5, 5, 5, 0.95)), url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -1;
            pointer-events: none;
            will-change: transform;
        }

        /* Typography */
        h1, h2, h3, .serif {
            font-family: var(--font-serif);
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .gold-text {
            color: var(--gold-accent);
        }

        .small-caps {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 500;
        }

        /* Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--nav-bg);
            z-index: 1000;
            border-bottom: 1px solid rgba(201, 168, 76, 0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-placeholder {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 1001;
        }

        .mobile-menu-btn span {
            display: block;
            width: 25px;
            height: 2px;
            background-color: var(--text-color);
            margin: 5px 0;
            transition: all 0.3s ease;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2.5rem;
            align-items: center;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
            font-weight: 300;
            position: relative;
            display: inline-block;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -4px;
            left: 50%;
            background-color: var(--gold-accent);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        nav ul li a:hover {
            color: var(--gold-accent);
            transform: translateY(-2px);
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        .gold-rule {
            width: 120px;
            height: 1px;
            background-color: var(--gold-accent);
            margin: 2rem auto 0;
        }

        /* CTA Section */
        .cta-strip {
            background-color: #050505;
            padding: 8rem 2rem;
            text-align: center;
            border-top: 1px solid rgba(201, 168, 76, 0.1);
            border-bottom: 1px solid rgba(201, 168, 76, 0.1);
            position: relative;
        }

        .cta-strip::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(201, 168, 76, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .cta-strip p {
            font-family: var(--font-serif);
            font-size: 1.7rem;
            margin-bottom: 3rem;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
            color: #ddd;
        }

        .register-btn {
            display: inline-block;
            background-color: var(--gold-accent);
            color: var(--bg-color);
            padding: 1.4rem 4rem;
            text-decoration: none;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.2, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            z-index: 2;
        }

        .register-btn:hover {
            background-color: #e0c06e;
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Additional Artworks Section */
        .additional-artworks {
            padding: 10rem 2rem 8rem; /* Increased top padding for header */
            max-width: 1300px;
            margin: 0 auto;
            min-height: 80vh;
        }

        .additional-artworks-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .additional-artworks-header h2 {
            font-size: 2.5rem;
            color: white;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        .additional-gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 3rem;
        }

        .additional-artwork-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(201, 168, 76, 0.1);
            padding: 1.5rem;
            transition: transform 0.8s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.8s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .additional-artwork-card::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border: 1px solid rgba(201, 168, 76, 0.05);
            pointer-events: none;
            transform: scale(0.96);
            opacity: 0.5;
            transition: transform 0.8s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.8s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .additional-artwork-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold-accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 30px rgba(201, 168, 76, 0.15), inset 0 0 15px rgba(201, 168, 76, 0.05);
        }

        .additional-artwork-card:hover::before {
            border-color: rgba(201, 168, 76, 0.4);
            transform: scale(1);
            opacity: 1;
        }

        .additional-img-container {
            aspect-ratio: 1;
            background-color: #050505;
            position: relative;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .additional-img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .additional-artwork-card:hover .additional-img-container img {
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            padding: 8rem 2rem 4rem;
            background-color: var(--bg-color);
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .footer-logo {
            margin-bottom: 4rem;
        }

        .footer-links {
            display: flex;
            gap: 4rem;
            list-style: none;
            margin-bottom: 5rem;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0.5;
            transition: all 0.3s ease;
            position: relative;
            display: inline-block;
        }

        .footer-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -4px;
            left: 50%;
            background-color: var(--gold-accent);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .footer-links a:hover {
            opacity: 1;
            color: var(--gold-accent);
            transform: translateY(-2px);
        }

        .footer-links a:hover::after {
            width: 100%;
        }

        .footer-legal {
            display: flex;
            gap: 3rem;
            margin-bottom: 3rem;
        }

        .footer-legal a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.75rem;
            opacity: 0.3;
            transition: all 0.3s ease;
            position: relative;
            display: inline-block;
        }

        .footer-legal a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 50%;
            background-color: var(--text-color);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .footer-legal a:hover {
            opacity: 0.7;
            transform: translateY(-2px);
        }

        .footer-legal a:hover::after {
            width: 100%;
        }

        .copyright {
            font-size: 0.75rem;
            opacity: 0.2;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Animations */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1.2s cubic-bezier(0.2, 0, 0.2, 1), transform 1.2s cubic-bezier(0.2, 0, 0.2, 1);
            will-change: opacity, transform;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Mobile Adjustments */
        @media (max-width: 992px) {
            .additional-gallery-grid {
                grid-template-columns: 1fr;
                max-width: 600px;
                margin: 0 auto;
            }
            
            .mobile-menu-btn {
                display: block;
            }

            nav ul {
                display: flex;
                flex-direction: column;
                position: fixed;
                top: 0;
                right: -100%;
                width: 100%;
                height: 100vh;
                background-color: rgba(5, 5, 5, 0.98);
                backdrop-filter: blur(10px);
                justify-content: center;
                align-items: center;
                transition: right 0.4s ease;
                z-index: 1000;
                margin: 0;
                padding: 0;
            }

            nav ul.active {
                right: 0;
            }

            nav ul li {
                margin: 1.5rem 0;
            }

            nav ul li a {
                font-size: 1.5rem;
            }

            .mobile-menu-btn.active span:nth-child(1) {
                transform: translateY(7px) rotate(45deg);
            }
            .mobile-menu-btn.active span:nth-child(2) {
                opacity: 0;
            }
            .mobile-menu-btn.active span:nth-child(3) {
                transform: translateY(-7px) rotate(-45deg);
            }
        }

        @media (max-width: 600px) {
            .nav-container {
                padding: 1rem;
            }
            
            .footer-links {
                flex-direction: column;
                gap: 1.5rem;
            }

            .footer-legal {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>

    <script>
        // Optimized Scroll Handling with requestAnimationFrame
        let ticking = false;

        function onScroll() {
            if (!ticking) {
                window.requestAnimationFrame(function() {
                    handleScrollEffects();
                    ticking = false;
                });
                ticking = true;
            }
        }

        function handleScrollEffects() {
            var scrolled = window.scrollY;

            // 1. Header Effect
            var header = document.getElementById("main-header");
            if (scrolled > 50) {
                header.style.padding = "0.5rem 0";
                header.style.backgroundColor = "rgba(10, 10, 10, 0.98)";
            } else {
                header.style.padding = "0";
                header.style.backgroundColor = "rgba(10, 10, 10, 0.95)";
            }
        }

        // Use passive event listener for better scroll performance
        window.addEventListener("scroll", onScroll, { passive: true });
        
        // Intersection Observer for Reveal Animations
        document.addEventListener("DOMContentLoaded", function() {
            handleScrollEffects(); // Initial check for header

            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.reveal').forEach(el => {
                observer.observe(el);
            });

            // Mobile menu toggle
            const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
            const navLinks = document.querySelector('nav ul');

            if (mobileMenuBtn && navLinks) {
                mobileMenuBtn.addEventListener('click', () => {
                    mobileMenuBtn.classList.toggle('active');
                    navLinks.classList.toggle('active');
                });

                // Close menu when clicking a link
                document.querySelectorAll('nav ul li a').forEach(link => {
                    link.addEventListener('click', () => {
                        mobileMenuBtn.classList.remove('active');
                        navLinks.classList.remove('active');
                    });
                });
            }
        });
    </script>
